version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: codex-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codex_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codex-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codex-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codex_dev
      JWT_SECRET_KEY: seu-secreto-jwt-muito-seguro-e-longo-aqui-desenvolvimento
      ASPNETCORE_URLS: http://+:5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    networks:
      - codex-network
    volumes:
      - .:/app

volumes:
  postgres_data:

networks:
  codex-network:
    driver: bridge
