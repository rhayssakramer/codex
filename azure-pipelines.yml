trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerRegistryServiceConnection: 'codexacr2'
  imageRepository: 'codexapi'
  containerRegistry: 'codexacr2.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/backend/Dockerfile'
  tag: '$(Build.BuildId)'
  resourceGroupName: 'codex-rg'
  containerAppName: 'codex-api'
  appServiceName: 'codex-web'

stages:
  - stage: Build
    displayName: Build Applications
    jobs:
      - job: BuildBackend
        displayName: Build Backend Docker Image
        steps:
          - task: Docker@2
            displayName: Build Docker Image
            inputs:
              command: build
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistryServiceConnection: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest
              arguments: '--build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)'

      - job: BuildFrontend
        displayName: Build Frontend Angular App
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - script: |
              cd $(Build.SourcesDirectory)/frontend
              npm install
            displayName: 'npm install'

          - script: |
              cd $(Build.SourcesDirectory)/frontend
              npm run build -- --configuration production
            displayName: 'npm build'

          - task: PublishBuildArtifacts@1
            inputs:
              pathToPublish: '$(Build.SourcesDirectory)/frontend/dist'
              artifactName: 'frontend-dist'
              publishLocation: 'Container'
            displayName: 'Publish Frontend Artifacts'

  - stage: Push
    displayName: Push to Registry
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PushImage
        displayName: Push Docker Image to ACR
        steps:
          - task: Docker@2
            displayName: Push Image to ACR
            inputs:
              command: push
              repository: $(imageRepository)
              containerRegistryServiceConnection: $(dockerRegistryServiceConnection)
              tags: |
                $(tag)
                latest

  - stage: Validate
    displayName: Validate Build
    dependsOn: Push
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: Verify Images Built
        steps:
          - script: |
              echo "Build and Push stages completed successfully"
              echo "Next: Deploy manually via Azure CLI"
            displayName: 'Build validation complete'
