<div class="login-container">
  <div class="login-image">
    <canvas #particlesCanvas class="particles-canvas"></canvas>
    <div class="image-overlay">
      <img src="/assets/logo.png" alt="Codex Logo" class="logo-image">
      <h1>CODEX</h1>
      <p>Biblioteca de Conteúdos de Programação</p>
    </div>
  </div>

  <div class="login-form-container">
    <div class="login-card">
      <div class="login-header">
        <h2>Bem-vindo</h2>
        <p>Faça login para continuar</p>
      </div>

      <form (ngSubmit)="login()" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            placeholder="seu@email.com"
            [(ngModel)]="email"
            name="email"
            (keypress)="handleKeyPress($event)"
          />
        </div>

        <div class="form-group password-group">
          <div class="password-header">
            <label for="password">Senha</label>
            <a href="#" class="forgot-password" (click)="$event.preventDefault(); forgotPassword()">
              Esqueci a senha
            </a>
          </div>
          <div class="password-input-wrapper">
            <input
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              (keypress)="handleKeyPress($event)"
            />
            <button 
              type="button" 
              class="toggle-password-btn" 
              (click)="showPassword = !showPassword"
              tabindex="-1"
            >
              <i [class]="showPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
            </button>
          </div>
        </div>

        <div *ngIf="error" class="error-message">
          {{ error }}
        </div>

        <button type="submit" class="login-button" [disabled]="loading">
          {{ loading ? 'Carregando...' : 'Entrar' }}
        </button>
      </form>

      <div class="social-divider">
        <span>ou</span>
      </div>

      <div class="social-buttons">
        <button 
          type="button" 
          class="social-button google-button" 
          (click)="loginWithGoogle()"
          [disabled]="socialLoading"
        >
          <svg class="social-icon google-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#1f9cf0"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34a853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#fbbc05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#ea4335"/>
          </svg>
          <span>Google</span>
        </button>
        <button 
          type="button" 
          class="social-button outlook-button" 
          (click)="loginWithOutlook()"
          [disabled]="socialLoading"
        >
          <img class="social-icon outlook-icon" src="https://m.media-amazon.com/images/I/51tOZiEHNLL._h1_.png" alt="Outlook" />
          <span>Outlook</span>
        </button>
      </div>

      <div *ngIf="socialError" class="error-message">
        {{ socialError }}
      </div>

      <div class="login-footer">
        <p>Não tem uma conta? <a href="#" (click)="$event.preventDefault(); showRegisterModal = true">Crie uma agora</a></p>
      </div>
    </div>
  </div>
</div>

<!-- Modal de Registro -->
<div class="register-modal" *ngIf="showRegisterModal" (click)="closeRegisterModal()">
  <div class="register-modal-content" (click)="$event.stopPropagation()">
    <div class="register-modal-header">
      <h2>Criar Conta</h2>
      <button class="register-modal-close" (click)="closeRegisterModal()">✕</button>
    </div>

    <div class="register-modal-header-divider"></div>

    <form (ngSubmit)="register()" class="register-form">
      <div class="foto-perfil-container">
        <div class="foto-circle-wrapper" (click)="!registerFotoPreview && fotoInput.click()">
          <div class="foto-circle">
            <img *ngIf="registerFotoPreview" [src]="registerFotoPreview" alt="Preview" class="foto-img" />
            <span *ngIf="!registerFotoPreview" class="foto-placeholder">
              <i class="fas fa-user"></i>
            </span>
            <button 
              type="button" 
              class="camera-btn" 
              (click)="fotoInput.click(); $event.stopPropagation()"
              title="Trocar foto"
            >
              <i class="fas fa-camera"></i>
            </button>
          </div>
          <input 
            type="file" 
            accept="image/*" 
            (change)="onFotoSelected($event)" 
            hidden
            #fotoInput
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="register-nome">Nome *</label>
          <input
            type="text"
            id="register-nome"
            placeholder="Seu nome"
            [(ngModel)]="registerNome"
            name="nome"
          />
        </div>
        <div class="form-group">
          <label for="register-sobrenome">Sobrenome *</label>
          <input
            type="text"
            id="register-sobrenome"
            placeholder="Seu sobrenome"
            [(ngModel)]="registerSobrenome"
            name="sobrenome"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="register-email">Email *</label>
        <input
          type="email"
          id="register-email"
          placeholder="seu@email.com"
          [(ngModel)]="registerEmail"
          name="email"
        />
      </div>

      <div class="form-group">
        <label for="register-password">Senha *</label>
        <div class="password-input-wrapper">
          <input
            [type]="showRegisterPassword ? 'text' : 'password'"
            id="register-password"
            placeholder="••••••••"
            [(ngModel)]="registerPassword"
            name="password"
          />
          <button 
            type="button" 
            class="toggle-password-btn" 
            (click)="showRegisterPassword = !showRegisterPassword"
            tabindex="-1"
          >
            <i [class]="showRegisterPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="register-confirm">Confirmar Senha *</label>
        <div class="password-input-wrapper">
          <input
            [type]="showRegisterConfirmPassword ? 'text' : 'password'"
            id="register-confirm"
            placeholder="••••••••"
            [(ngModel)]="registerConfirmPassword"
            name="confirmPassword"
          />
          <button 
            type="button" 
            class="toggle-password-btn" 
            (click)="showRegisterConfirmPassword = !showRegisterConfirmPassword"
            tabindex="-1"
          >
            <i [class]="showRegisterConfirmPassword ? 'fas fa-eye-slash' : 'fas fa-eye'"></i>
          </button>
        </div>
      </div>

      <div *ngIf="registerError" class="error-message">
        {{ registerError }}
      </div>

      <div class="register-modal-form-divider"></div>

      <button type="submit" class="register-button" [disabled]="loading">
        {{ loading ? 'Criando...' : 'Criar Conta' }}
      </button>
    </form>

    <div class="register-modal-divider">
      <span>ou</span>
    </div>

    <div class="register-modal-footer">
      <p>Já tem uma conta? <a href="#" (click)="$event.preventDefault(); closeRegisterModal(); showRegisterModal = false">Faça login</a></p>
    </div>
  </div>
</div>
